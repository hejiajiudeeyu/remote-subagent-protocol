name: Published Images Smoke

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to validate
        required: false
        default: latest

jobs:
  published-image-compose-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      COMPOSE_NO_BUILD: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke published image path from GHCR
        run: npm run test:published-images-smoke
      - name: Smoke public-stack image path from GHCR
        run: npm run test:public-stack-smoke
