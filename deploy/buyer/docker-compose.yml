services:
  buyer-controller:
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-buyer:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile.workspace
      args:
        APP_PATH: apps/buyer-controller
    environment:
      PORT: ${PORT:-8081}
      SERVICE_NAME: buyer-controller
      PLATFORM_API_BASE_URL: ${PLATFORM_API_BASE_URL}
      PLATFORM_API_KEY: ${PLATFORM_API_KEY:-}
      TRANSPORT_BASE_URL: ${TRANSPORT_BASE_URL}
      TRANSPORT_RECEIVER: ${TRANSPORT_RECEIVER:-buyer-controller}
      ACK_DEADLINE_S: ${ACK_DEADLINE_S:-120}
      TIMEOUT_CONFIRMATION_MODE: ${TIMEOUT_CONFIRMATION_MODE:-ask_by_default}
      HARD_TIMEOUT_AUTO_FINALIZE: ${HARD_TIMEOUT_AUTO_FINALIZE:-true}
      BUYER_CONTROLLER_POLL_INTERVAL_ACTIVE_S: ${BUYER_CONTROLLER_POLL_INTERVAL_ACTIVE_S:-5}
      BUYER_CONTROLLER_POLL_INTERVAL_BACKOFF_S: ${BUYER_CONTROLLER_POLL_INTERVAL_BACKOFF_S:-15}
      BUYER_CONTROLLER_INBOX_POLL_INTERVAL_MS: ${BUYER_CONTROLLER_INBOX_POLL_INTERVAL_MS:-250}
      BUYER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS: ${BUYER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS:-250}
      BUYER_CONTROLLER_EVENTS_SYNC_BATCH_SIZE: ${BUYER_CONTROLLER_EVENTS_SYNC_BATCH_SIZE:-25}
      DATABASE_URL: ${DATABASE_URL:-}
      SQLITE_DATABASE_PATH: ${SQLITE_DATABASE_PATH:-/data/buyer-controller.sqlite}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-8081}:8081"
    volumes:
      - buyer-data:/data

volumes:
  buyer-data:
